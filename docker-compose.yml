services:
  corvus:
    build: ./corvus-server
    ports:
      - "9420:8000"
    environment:
      - CORVUS_API_KEYS=my-agent:$(openssl rand -hex 32)
      - NEO4J_URI=bolt://corvus-neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=changeme
    volumes:
      - corvus-data:/data
    depends_on:
      corvus-neo4j:
        condition: service_healthy

  corvus-neo4j:
    image: neo4j:5-community
    environment:
      - NEO4J_AUTH=neo4j/changeme
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  corvus-data:
  neo4j-data:
