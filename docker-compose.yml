services:
  corvus:
    build: ./corvus-server
    ports:
      - "9420:8000"
    environment:
      - OP_CONNECT_HOST=${OP_CONNECT_HOST:?OP_CONNECT_HOST required}
      - OP_CONNECT_TOKEN=${OP_CONNECT_TOKEN:?OP_CONNECT_TOKEN required}
      - NEO4J_URI=bolt://corvus-neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    volumes:
      - corvus-data:/data
      - ./config/corvus-entrypoint.sh:/usr/local/bin/corvus-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "-c", "/usr/local/bin/corvus-entrypoint.sh && exec uvicorn src.app:app --host 0.0.0.0 --port 8000"]
    depends_on:
      corvus-neo4j:
        condition: service_healthy

  corvus-neo4j:
    image: neo4j:5-community
    environment:
      - OP_CONNECT_HOST=${OP_CONNECT_HOST:?OP_CONNECT_HOST required}
      - OP_CONNECT_TOKEN=${OP_CONNECT_TOKEN:?OP_CONNECT_TOKEN required}
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j-data:/data
      - ./config/neo4j-entrypoint.sh:/usr/local/bin/neo4j-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "-c", "/usr/local/bin/neo4j-entrypoint.sh && exec docker-entrypoint.sh neo4j"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  corvus-data:
  neo4j-data: