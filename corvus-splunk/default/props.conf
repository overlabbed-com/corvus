# OCSF event parsing for Corvus sourcetype

[corvus:ocsf]
INDEXED_EXTRACTIONS = json
KV_MODE = json
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%f%z
TIME_PREFIX = "time":
MAX_TIMESTAMP_LOOKAHEAD = 50

# Auto-lookup OCSF class names
LOOKUP-ocsf_class = corvus_ocsf_class_lookup class_uid OUTPUT class_name category_name
LOOKUP-cmdb = corvus_cmdb_lookup service_name AS unmapped.target OUTPUT host service_type critical
LOOKUP-severity = corvus_severity_lookup severity_id OUTPUT severity_name
