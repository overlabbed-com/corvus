# Corvus saved searches — audit evidence, event chains, gap detection

# =========================================================================
# SOC 2 Compliance Evidence
# =========================================================================

[SOC2 CC6.1 - Logical Access Controls]
description = Evidence of access control enforcement — API authentication events
search = `corvus_events` class_uid=6002 activity_name="Logon" \
  | stats count by "unmapped.source" status_id \
  | eval result=if(status_id=1, "success", "failure")
dispatch.earliest_time = -90d@d
dispatch.latest_time = now
cron_schedule = 0 6 1 * *
is_scheduled = 1
action.email.to = compliance@corvus
action.email.subject = SOC 2 CC6.1 Evidence - Logical Access Controls

[SOC2 CC8.1 - Change Management]
description = Evidence of change control — all changes have windows, events, and outcomes
search = `corvus_changes` \
  | spath "unmapped.change_id" \
  | stats count as total_changes \
         dc("unmapped.change_id") as unique_changes \
         count(eval(activity_name="Execute")) as started \
         count(eval(activity_name="Other" AND "unmapped.outcome"="success")) as completed \
         count(eval(activity_name="Other" AND "unmapped.outcome"="failure")) as failed \
  | eval compliance_rate=round(completed/total_changes*100, 1)
dispatch.earliest_time = -90d@d
dispatch.latest_time = now
cron_schedule = 0 6 1 * *
is_scheduled = 1

[SOC2 CC7.2 - Security Incident Response]
description = Evidence of incident detection, investigation, and resolution
search = `corvus_incidents` \
  | spath "unmapped.incident_id" \
  | stats count as total_incidents \
         count(eval(activity_name="Create")) as opened \
         count(eval(activity_name="Update")) as investigated \
         count(eval(activity_name="Close")) as resolved \
         count(eval(activity_name="Other")) as escalated \
  | eval resolution_rate=round(resolved/opened*100, 1)
dispatch.earliest_time = -90d@d
dispatch.latest_time = now
cron_schedule = 0 6 1 * *
is_scheduled = 1

[SOC2 CC9.1 - Risk Mitigation]
description = Evidence of automated risk mitigation — remediation events with trust progression
search = `corvus_remediation` \
  | spath "unmapped.trust_tier" \
  | stats count by "unmapped.action_type" "unmapped.trust_tier" "unmapped.outcome" \
  | sort - count
dispatch.earliest_time = -90d@d
dispatch.latest_time = now

# =========================================================================
# Operational Queries
# =========================================================================

[Event Chain - Target 24h]
description = Complete event chain for a target in the last 24 hours
search = `corvus_target($target$)` earliest=-24h \
  | sort _time \
  | table _time class_name activity_name "unmapped.source" "unmapped.severity" "unmapped.description" \
  | rename "unmapped.source" as agent "unmapped.severity" as severity "unmapped.description" as details

[Event Chain - Incident Graph]
description = All events related to a specific incident
search = `corvus_events` "unmapped.incident_id"="$incident_id$" \
  | sort _time \
  | table _time class_name activity_name "unmapped.source" "unmapped.target" "unmapped.severity" \
  | rename "unmapped.source" as agent "unmapped.target" as target "unmapped.severity" as severity

[Runbook Coverage Gap]
description = Services in CMDB that have no runbook triage coverage
search = `corvus_events` class_uid=6003 \
  | stats dc("unmapped.target") as triaged_services values("unmapped.target") as targets \
  | mvexpand targets \
  | lookup corvus_cmdb_lookup service_name AS targets OUTPUT service_type critical \
  | search NOT [search `corvus_events` class_uid=6003 \
    | stats count by "unmapped.target" \
    | rename "unmapped.target" as targets \
    | fields targets] \
  | table targets service_type critical
dispatch.earliest_time = -30d@d

[Agent Activity Summary]
description = Activity breakdown by agent source
search = `corvus_events` \
  | timechart span=1h count by "unmapped.source" \
  | rename "unmapped.source" as agent

[High Severity Events]
description = All warning and critical events
search = `corvus_events` (severity_id>=3 OR "unmapped.severity"="warning" OR "unmapped.severity"="critical") \
  | sort - _time \
  | table _time class_name "unmapped.source" "unmapped.target" "unmapped.severity" "unmapped.description" \
  | rename "unmapped.source" as agent "unmapped.target" as target "unmapped.severity" as severity "unmapped.description" as details

[Incident Resolution Time]
description = Mean time to resolution by service type
search = `corvus_incidents` activity_name="Close" \
  | spath "unmapped.resolution_time_minutes" \
  | lookup corvus_cmdb_lookup service_name AS "unmapped.target" OUTPUT service_type \
  | stats avg("unmapped.resolution_time_minutes") as avg_mttr \
         median("unmapped.resolution_time_minutes") as median_mttr \
         count as resolved \
         by service_type \
  | eval avg_mttr=round(avg_mttr, 1) \
  | sort avg_mttr

# =========================================================================
# Gap Detection
# =========================================================================

[CI vs NFI Workstream Gap]
description = Containers without recent events (potential blind spots)
search = | inputlookup cmdb_services.csv \
  | search critical=1 \
  | join type=left service_name \
    [search `corvus_events` earliest=-7d \
     | stats latest(_time) as last_event count as event_count by "unmapped.target" \
     | rename "unmapped.target" as service_name] \
  | eval days_since_event=round((now()-last_event)/86400, 1) \
  | where isnull(last_event) OR days_since_event > 7 \
  | table service_name host service_type critical days_since_event event_count \
  | sort - critical days_since_event
