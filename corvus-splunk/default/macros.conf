# Corvus search macros — reusable building blocks for dashboards and saved searches

[corvus_events]
definition = index=corvus sourcetype="corvus:ocsf"
iseval = 0

[corvus_events(1)]
args = timerange
definition = index=corvus sourcetype="corvus:ocsf" earliest=$timerange$
iseval = 0

[corvus_incidents]
definition = `corvus_events` class_uid=2005
iseval = 0

[corvus_changes]
definition = `corvus_events` class_uid=5019
iseval = 0

[corvus_remediation]
definition = `corvus_events` class_uid=6003
iseval = 0

[corvus_compliance]
definition = `corvus_events` class_uid=6002
iseval = 0

[corvus_session]
definition = `corvus_events` (class_uid=6003 OR class_uid=6004)
iseval = 0

[corvus_target(1)]
args = target
definition = `corvus_events` "unmapped.target"="$target$"
iseval = 0
