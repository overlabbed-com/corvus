name: Secrets Management Triage
type: triage
service_type: secrets
version: 1
description: FMEA-informed investigation for secrets management (1Password Connect)

investigation:
  - name: Check container logs
    type: containers.logs
    params:
      name: "{{ target }}"
      lines: 100
      grep: "error|sync|credential|connect|timeout|corrupt"
    outputs:
      filtered_logs: "{{ result }}"

  - name: Check container state
    type: containers.inspect
    params:
      name: "{{ target }}"
      field: "State"
    outputs:
      container_state: "{{ result }}"

  - name: Health endpoint check
    type: http.check
    params:
      url: "http://{{ target }}:8080/health"
      timeout: 10
      expect_status: 200
    outputs:
      health_status: "{{ result }}"

diagnosis_hints:
  - pattern: "sync|1password cloud|connect.*fail"
    root_cause: sync_failure
    restart_safe: false
    explanation: "1Password sync failure — check cloud connectivity, do NOT restart blindly"

  - pattern: "credential.*corrupt|file.*corrupt|invalid.*format"
    root_cause: credential_corruption
    restart_safe: false
    explanation: "Credential file corruption — ESCALATE immediately, do not restart"

  - pattern: "timeout|unresponsive|health.*fail"
    root_cause: api_unresponsive
    restart_safe: false
    explanation: "API unresponsive — check dependent services before restart"

remediation:
  restart_safe: false
  pre_restart_checks:
    - "Check all services that depend on secrets"
    - "Verify 1Password cloud connectivity"
  post_restart_verification:
    - type: http.check
      params:
        url: "http://{{ target }}:8080/health"
        timeout: 60
        expect_status: 200
  escalation_triggers:
    - "credential corruption"
    - "sync failure"
    - "all consumers affected"
