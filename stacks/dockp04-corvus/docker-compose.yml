# Corvus - Operational Governance Platform
# Next-gen customer zero deployment
#
# Deploy: git push → CI/CD → ssh dockp04 "docker compose pull && docker compose up -d"
# Health: http://corvus.yourdomain.com/health
# API: http://corvus.yourdomain.com/ops/events

services:
  corvus:
    image: ghcr.io/overlabbed-com/corvus:latest
    container_name: corvus
    hostname: corvus
    networks:
      - corvus-net
      - proxy-net
    volumes:
      - corvus-data:/data
      - /mnt/docker/stacks/dockp04-corvus/config/modules:/app/config/modules:ro
      - /mnt/docker/stacks/dockp04-corvus/config/runbooks:/app/config/runbooks:ro
    environment:
      # Core configuration
      - CORVUS_DATA_DIR=/data
      - CORVUS_DEV_MODE=false
      - CORVUS_CHANGE_EXPIRY_HOURS=4

      # Authentication - API keys for agents
      # Format: key_name:key_type:role (admin, ops-write, ops-read, agent)
      - CORVUS_API_KEYS=${CORVUS_API_KEYS}

      # OIDC Authentication (optional - for human users)
      - OIDC_ENABLED=${OIDC_ENABLED:-false}
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL:-https://accounts.google.com}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-}

      # SIEM Forwarding (optional)
      - CORVUS_SIEM_URL=${CORVUS_SIEM_URL:-}
      - CORVUS_SIEM_TOKEN=${CORVUS_SIEM_TOKEN:-}

      # LLM for RAG/knowledge (optional)
      - CORVUS_LLM_URL=${CORVUS_LLM_URL:-}

      # Neo4j Graph (optional - for CMDB relationships)
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-}

      # MCP Server (for agent integration)
      - CORVUS_MCP_ENABLED=true
      - CORVUS_MCP_INTERNAL_KEY=corvus-mcp-internal

    labels:
      # Compose metadata
      - com.docker.compose.version=5.1.0
      - com.docker.compose.project=dockp04-corvus
      - com.docker.compose.service=corvus

      # Service classification (for CMDB auto-discovery)
      - corvus.service_type=automation
      - corvus.critical=true
      - corvus.alert_policy=default

      # Monitoring
      - netdata.dashboards.enable=true
      - netdata.export=true

      # Reverse proxy (Caddy) - customize for your domain
      # Example: - caddy.corvus.yourdomain.com=corvus:8000

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=2).raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Neo4j graph database for CMDB relationships (optional but recommended)
  neo4j:
    image: neo4j:5.22.0
    container_name: corvus-neo4j
    hostname: neo4j
    networks:
      - corvus-net
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-changeme123}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512M
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_memory_pagecache_size=512M
    labels:
      - corvus.service_type=database
      - corvus.critical=false
    restart: unless-stopped

networks:
  corvus-net:
    driver: bridge
  proxy-net:
    external: true  # Shared with Caddy/reverse proxy

volumes:
  corvus-data:
    driver: local
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local
