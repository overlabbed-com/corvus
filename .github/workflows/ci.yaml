name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: corvus-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check src/ tests/

      - name: Format check
        run: ruff format --check src/ tests/

  sast:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: corvus-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SAST tools
        run: pip install bandit

      - name: Bandit
        run: bandit -r src/ -c pyproject.toml -f json -o bandit-report.json || true

      - name: Bandit check
        run: |
          python -c "
          import json, sys
          with open('bandit-report.json') as f:
              data = json.load(f)
          results = data.get('results', [])
          medium_plus = [r for r in results if r['issue_severity'] in ('MEDIUM', 'HIGH')]
          if medium_plus:
              for r in medium_plus:
                  print(f\"[{r['issue_severity']}] {r['issue_text']} @ {r['filename']}:{r['line_number']}\")
              print(f'\n{len(medium_plus)} MEDIUM+ findings — failing SAST gate')
              sys.exit(1)
          print('No MEDIUM+ findings')
          "

      - name: Install Semgrep
        run: pip install semgrep

      - name: Semgrep
        run: semgrep scan --config p/python --config p/secrets --error
        working-directory: .

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: corvus-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: corvus-server/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff bandit

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short \
            --ignore=tests/test_mcp_server.py \
            --ignore=tests/test_patterns.py \
            --ignore=tests/test_deploy_manager.py \
            --ignore=tests/test_governance_auth.py \
            --ignore=tests/test_governance_e2e.py \
            --ignore=tests/test_graph_guardrails.py \
            --ignore=tests/test_correlations.py \
            --ignore=tests/test_e2e.py \
            --ignore=tests/test_events.py

  docker:
    needs: [lint, sast, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: corvus-server
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Deploy to dockp04
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Deploying to dockp04..."
          # Build locally on dockp04 (runner can't pull from GHCR)
          rsync -a --delete \
            -e 'ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30' \
            corvus-server/ \
            github-runner@192.168.20.14:/home/github-runner/corvus-server/
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 192.168.20.14 \
            'cd /home/github-runner/corvus-server && docker build -t ghcr.io/overlabbed-com/corvus:latest . && cd /mnt/docker/stacks/dockp04-corvus && sudo docker compose up -d --remove-orphans corvus'
          echo "Built and restarted. Waiting for healthy..."
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 192.168.20.14 \
            'for i in $(seq 1 30); do sleep 2; STATUS=$(sudo docker inspect corvus --format "{{.State.Health.Status}}" 2>/dev/null); [ "$STATUS" = "healthy" ] && echo "corvus is healthy" && break; echo "waiting... ${i}s"; done; sudo docker inspect corvus --format "{{.State.Health.Status}}"'